# Proxy opcional — painel NFe na porta 8090 (sem conflito com BIWEB :5000)
# Copie para: /etc/nginx/sites-available/nfe-web
# ln -s /etc/nginx/sites-available/nfe-web /etc/nginx/sites-enabled/
# nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name nfe.seudominio.local;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
